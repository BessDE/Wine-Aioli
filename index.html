<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wine Recommendation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap');

:root{
  --bg:#f7f3ee;
  --card:#fffaf5;
  --wine:#7b1e2b;
  --wine-dark:#4f1018;
  --text:#2b2421;
  --muted:#7b6f68;
  --line:#e5d8ce;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  margin:0;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:920px;
  margin:0 auto;
  padding:38px 18px 56px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:54px;
  line-height:1;
  color:var(--wine);
  margin:0 0 28px;
  letter-spacing:-1px;
}

h2{
  font-family:'Playfair Display',serif;
  font-size:34px;
  color:var(--wine);
  margin:34px 0 18px;
}

form{
  display:grid;
  gap:18px;
  padding:24px;
  background:rgba(255,250,245,.75);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:0 18px 45px rgba(79,16,24,.08);
}

label{
  display:grid;
  gap:8px;
  font-size:14px;
  font-weight:600;
  color:var(--wine-dark);
}

select{
  appearance:auto;
  padding:13px 14px;
  font-size:15px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
}

select:focus{
  outline:none;
  border-color:var(--wine);
  box-shadow:0 0 0 3px rgba(123,30,43,.12);
}

button{
  padding:14px 18px;
  font-size:15px;
  font-weight:600;
  border:none;
  border-radius:999px;
  cursor:pointer;
  background:var(--wine);
  color:#fffaf5;
  font-family:'Inter',system-ui,sans-serif;
  box-shadow:0 12px 26px rgba(123,30,43,.22);
}

button:hover{
  background:var(--wine-dark);
}

#again{
  margin-top:16px;
  background:transparent;
  color:var(--wine);
  border:1px solid var(--wine);
  box-shadow:none;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:28px;
  padding:26px;
  margin-top:16px;
  box-shadow:0 18px 45px rgba(79,16,24,.08);
}

.card:hover{
  transform:translateY(-2px);
  transition:.2s ease;
}

.card img{
  filter:drop-shadow(0 18px 18px rgba(0,0,0,.16));
}

.card strong{
  font-family:'Playfair Display',serif;
  color:var(--wine);
  letter-spacing:.2px;
}

.small{
  color:var(--muted);
  font-size:14px;
  margin-top:6px;
}

#status{
  color:var(--muted);
  margin-top:12px;
}

@media (max-width:640px){
  h1{
    font-size:42px;
  }

  .card div[style*="display:flex"]{
    flex-direction:column;
  }

  .card img{
    width:120px !important;
    height:180px !important;
  }
}
</style>
</head>

<body>
<main class="container">
<h1>Find your wine</h1>

<form id="quiz">
  <label>
    1) What wine are you in the mood for?
    <select name="color" required>
      <option value="">Select…</option>
      <option value="Red"> Red</option>
      <option value="White"> White</option>
      <option value="Rosé"> Rosé</option>
      <option value="Sparkling"> Sparkling</option>
    </select>
  </label>

  <label>
    2) How would you like your wine to feel?
    <select name="body" required>
      <option value="">Select…</option>
      <option value="light"> Fresh & light</option>
      <option value="medium"> Balanced</option>
      <option value="full"> Rich & bold</option>
    </select>
  </label>

  <label>
    3) Which flavors do you enjoy most?
    <select name="Profile" required>
       <option value="">Select…</option>
    <option value="fruity"> Fruity & fresh</option>
    <option value="floral"> Floral & aromatic</option>
    <option value="earthy"> Earthy & savory</option>
    <option value="spicy"> Spicy & peppery</option>
    <option value="oaky"> Oaky & vanilla</option>
    <option value="mineral"> Mineral & fresh</option>
    </select>
  </label>

  <label>
    4) How adventurous are you feeling today?
    <select name="Country" required>
      <option value="">Select…</option>
      <option value="SPAIN"> Sunny Spain</option>
      <option value="USA"> California dreaming</option>
      <option value="Argentina"> Fervent Argentina</option>
      <option value="France"> Franch kiss</option>
      <option value="Reda"> Trust Reda</option>
    </select>
  </label>

  <button type="submit">Recommend 2 wines</button>
</form>

<section id="results" hidden>
  <h2>Recommended</h2>
  <div id="cards"></div>
  <button id="again" type="button">Try again</button>
</section>

<p class="small" id="status"></p>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSY_lp19wElB3U0YTFDmuBspJoo_iWbRFfmHUzNMf_jb-fg9SuArwI91NyOG4Mg52j-kkSGdmXdk7r/pub?gid=0&single=true&output=csv";

let wines = [];

function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (c === '"') {
      if (inQuotes && n === '"') { cell += '"'; i++; }
      else inQuotes = !inQuotes;
      continue;
    }
    if (!inQuotes && c === ",") { row.push(cell); cell = ""; continue; }
    if (!inQuotes && (c === "\n" || c === "\r")) {
      if (c === "\r" && n === "\n") i++;
      row.push(cell);
      if (row.some(v => v !== "")) rows.push(row);
      row = []; cell = "";
      continue;
    }
    cell += c;
  }
  row.push(cell);
  if (row.some(v => v !== "")) rows.push(row);
  return rows;
}

function normalizeText(v) {
  return String(v || "").trim().toLowerCase();
}

function normalizeProfile(p) {
  if (!p) return [];
  return String(p)
    .split(",")
    .map(x => normalizeText(x))
    .filter(Boolean);
}

function scoreWine(w, a) {
  let s = 0;

  // 1. strongest filter: color
  if (normalizeText(w.color) === normalizeText(a.color)) s += 100;

  // 2. country
  if (normalizeText(w.country) === normalizeText(a.country)) s += 50;

  // 3. body
  if (normalizeText(w.body) === normalizeText(a.body)) s += 20;

  // 4. weakest: profile
  if (w.profile.includes(normalizeText(a.profile))) s += 10;

  return s;
}
function render(list) {
  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  list.forEach(w => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div style="display:flex;gap:16px;align-items:flex-start;">

        ${w.image ? `
          <img 
            src="${w.image}" 
            alt="${w.name}" 
            style="
              width:140px;
              height:220px;
              object-fit:contain;
              border-radius:10px;
              flex-shrink:0;
            ">
        ` : ""}

        <div>
          <strong style="font-size:20px;">
            ${w.name}
          </strong>

          <div class="small" style="margin-top:6px;">
            ${w.year || "NV"} • ${w.country} • ${w.region}
          </div>

          <div class="small">
            ${w.grape || "—"} • ${w.body} body
          </div>

          <div style="margin-top:12px;line-height:1.5;">
            ${w.description || ""}
          </div>
        </div>

      </div>
    `;

    cards.appendChild(div);
  });

  document.getElementById("results").hidden = false;
}

async function loadWines() {
  const status = document.getElementById("status");
  status.textContent = "Loading wines…";
  const res = await fetch(CSV_URL, { cache: "no-store" });
  const text = await res.text();
  const rows = parseCSV(text);
  const header = rows[0];
  const i = h => header.indexOf(h);

  wines = rows.slice(1).map(r => ({
  name: r[i("Name")] || "",
  year: r[i("Year")] || "",
  country: r[i("Country")] || "",
  region: r[i("Region")] || "",
  color: r[i("Color")] || "",
  dryness: r[i("Dryness")] || "",
  body: normalizeText(r[i("Body")]),
  profile: normalizeProfile(r[i("Profile")]),
  grape: r[i("Grape")] || "",
  description: r[i("Description")] || "",
  image: r[i("Image")] || ""
})).filter(w => w.name);
  
  status.textContent = `Loaded ${wines.length} wines.`;
}

document.getElementById("quiz").addEventListener("submit", e => {
  e.preventDefault();

  const d = new FormData(e.target);

  const a = {
    color: d.get("color"),
    body: d.get("body"),
    profile: d.get("Profile"),
    country: d.get("Country")
  };

  const top = wines
  .map(w => ({ ...w, score: scoreWine(w, a) }))
  .filter(w => w.score > 0)
  .sort((a, b) => b.score - a.score)
  .slice(0, 2);

  render(top);
});

document.getElementById("again").addEventListener("click", () => {
  document.getElementById("results").hidden = true;
  document.getElementById("quiz").reset();
});

loadWines();
</script>
</body>
</html>
